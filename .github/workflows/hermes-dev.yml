name: Hermes Dev Runner

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Hermes dev task"
        required: true
        type: string
      receive_id:
        description: "Feishu receive id"
        required: false
        type: string

jobs:
  run-dev-task:
    runs-on: self-hosted

    env:
      HTTP_PROXY: http://127.0.0.1:7890
      HTTPS_PROXY: http://127.0.0.1:7890
      NO_PROXY: localhost,127.0.0.1
      HERMES_TASK: ${{ inputs.task }}
      HERMES_RECEIVE_ID: ${{ inputs.receive_id }}
      HERMES_CALLBACK_URL: ${{ secrets.HERMES_CALLBACK_URL }}
      HERMES_CALLBACK_SECRET: ${{ secrets.HERMES_CALLBACK_SECRET }}

    steps:
      - name: Print task
        shell: pwsh
        run: |
          Write-Host "Hermes received task:"
          Write-Host $env:HERMES_TASK
          Write-Host "Receive ID:"
          Write-Host $env:HERMES_RECEIVE_ID

      - name: Check tools
        shell: pwsh
        run: |
          git --version
          codex --version
          Get-Command codex

      - name: Run Codex in local repo
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          [Console]::InputEncoding = [System.Text.Encoding]::UTF8
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8

          $RepoPath = "C:\Users\AL\Documents\CharacterOS"
          if (!(Test-Path $RepoPath)) {
            throw "Repo path not found: $RepoPath"
          }

          Set-Location $RepoPath

          Write-Host "Current repo:"
          Get-Location

          Write-Host "Git status before:"
          git status --short

          $BranchName = "hermes/dev-" + (Get-Date -Format "yyyyMMdd-HHmmss")
          git checkout -b $BranchName
          Set-Content -Path (Join-Path $env:RUNNER_TEMP "hermes_branch.txt") -Value $BranchName -Encoding UTF8

          $PromptLines = New-Object System.Collections.Generic.List[string]
          $PromptLines.Add("你是 Codex，本次由 Hermes 自动触发。")
          $PromptLines.Add("")
          $PromptLines.Add("任务：")
          $PromptLines.Add($env:HERMES_TASK)
          $PromptLines.Add("")
          $PromptLines.Add("执行规则：")
          $PromptLines.Add("1. 先阅读相关代码，不要盲改。")
          $PromptLines.Add("2. 修改范围尽量小。")
          $PromptLines.Add("3. 不要删除已有测试。")
          $PromptLines.Add("4. 不要执行危险命令。")
          $PromptLines.Add("5. 修改后尽量运行已有测试或校验命令。")
          $PromptLines.Add("6. 不要提交 git，不要 push。")
          $PromptLines.Add("7. 完成后给出变更摘要。")
          $Prompt = $PromptLines -join [Environment]::NewLine

          Write-Host "Running Codex..."
          codex exec --dangerously-bypass-approvals-and-sandbox $Prompt

          Write-Host "Git status after:"
          $GitStatus = git status --short | Out-String
          Write-Host $GitStatus
          Set-Content -Path (Join-Path $env:RUNNER_TEMP "hermes_git_status.txt") -Value $GitStatus -Encoding UTF8

          Write-Host "Git diff:"
          $DiffStat = git diff --stat | Out-String
          Write-Host $DiffStat
          Set-Content -Path (Join-Path $env:RUNNER_TEMP "hermes_diff_stat.txt") -Value $DiffStat -Encoding UTF8

      - name: Send callback to Hermes
        if: always()
        continue-on-error: true
