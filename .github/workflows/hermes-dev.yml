name: Hermes Dev Runner

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Hermes dev task"
        required: true
        type: string

jobs:
  run-dev-task:
    runs-on: self-hosted

    env:
      HTTP_PROXY: http://127.0.0.1:7890
      HTTPS_PROXY: http://127.0.0.1:7890
      NO_PROXY: localhost,127.0.0.1

    steps:
      - name: Print task
        shell: powershell
        run: |
          Write-Host "Hermes received task:"
          Write-Host "${{ inputs.task }}"

      - name: Repair Codex Windows install
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "Installing Microsoft Visual C++ Redistributable..."
          $VcRedist = Join-Path $env:RUNNER_TEMP "vc_redist.x64.exe"
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile $VcRedist
          Start-Process -FilePath $VcRedist -ArgumentList "/install", "/quiet", "/norestart" -Wait

          Write-Host "Installing/updating Codex CLI for Windows..."
          powershell -NoProfile -ExecutionPolicy Bypass -Command "irm https://chatgpt.com/codex/install.ps1 | iex"

          $CodexCommand = Get-Command codex -ErrorAction Stop
          Write-Host "Codex command: $($CodexCommand.Source)"
          codex --version

          $SearchRoots = @(
            (Split-Path $CodexCommand.Source -Parent),
            "$env:USERPROFILE\.codex",
            "$env:LOCALAPPDATA\Programs",
            "$env:APPDATA\npm",
            "$env:APPDATA\npm\node_modules\@openai\codex"
          ) | Where-Object { $_ -and (Test-Path $_) } | Select-Object -Unique

          $SandboxHelper = Get-ChildItem -Path $SearchRoots -Recurse -Filter "codex-windows-sandbox-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1

          if (!$SandboxHelper) {
            throw "Codex Windows sandbox helper was not found after install: codex-windows-sandbox-setup.exe"
          }

          Write-Host "Codex sandbox helper: $($SandboxHelper.FullName)"
          $HelperDir = $SandboxHelper.DirectoryName
          Add-Content -Path $env:GITHUB_PATH -Value $HelperDir
          $env:Path = "$HelperDir;$env:Path"

      - name: Check tools
        shell: powershell
        run: |
          git --version
          codex --version
          Get-Command codex
          Get-Command codex-windows-sandbox-setup.exe

      - name: Run Codex in local repo
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $RepoPath = "C:\Users\AL\Documents\CharacterOS"

          if (!(Test-Path $RepoPath)) {
            throw "Repo path not found: $RepoPath"
          }

          Set-Location $RepoPath

          Write-Host "Current repo:"
          Get-Location

          Write-Host "Git status before:"
          git status --short

          $BranchName = "hermes/dev-" + (Get-Date -Format "yyyyMMdd-HHmmss")

          git checkout -b $BranchName

          $Prompt = @"
          你是 Codex，本次由 Hermes 自动触发。

          任务：
          ${{ inputs.task }}

          执行规则：
          1. 先阅读相关代码，不要盲改。
          2. 修改范围尽量小。
          3. 不要删除已有测试。
          4. 不要执行危险命令。
          5. 修改后尽量运行已有测试或校验命令。
          6. 不要提交 git，不要 push。
          7. 完成后给出变更摘要。
          "@

          Write-Host "Running Codex..."
          codex exec --full-auto $Prompt

          Write-Host "Git status after:"
          git status --short

          Write-Host "Git diff:"
          git diff --stat
