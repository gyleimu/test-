name: Hermes Dev Runner

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Hermes dev task"
        required: true
        type: string
      receive_id:
        description: "Feishu receive id"
        required: false
        type: string

jobs:
  run-dev-task:
    runs-on: self-hosted

    env:
      HTTP_PROXY: http://127.0.0.1:7890
      HTTPS_PROXY: http://127.0.0.1:7890
      NO_PROXY: localhost,127.0.0.1
      HERMES_CALLBACK_URL: ${{ secrets.HERMES_CALLBACK_URL }}
      HERMES_CALLBACK_SECRET: ${{ secrets.HERMES_CALLBACK_SECRET }}

    steps:
      - name: Print task
        shell: powershell
        run: |
          Write-Host "Hermes received task:"
          Write-Host "${{ inputs.task }}"
          Write-Host "Receive ID:"
          Write-Host "${{ inputs.receive_id }}"

      - name: Check tools
        shell: powershell
        run: |
          git --version
          codex --version
          Get-Command codex

      - name: Run Codex in local repo
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $RepoPath = "C:\Users\AL\Documents\CharacterOS"

          if (!(Test-Path $RepoPath)) {
            throw "Repo path not found: $RepoPath"
          }

          Set-Location $RepoPath

          Write-Host "Current repo:"
          Get-Location

          Write-Host "Git status before:"
          git status --short

          $BranchName = "hermes/dev-" + (Get-Date -Format "yyyyMMdd-HHmmss")

          git checkout -b $BranchName

          $Prompt = @"
          你是 Codex，本次由 Hermes 自动触发。

          任务：
          ${{ inputs.task }}

          执行规则：
          1. 先阅读相关代码，不要盲改。
          2. 修改范围尽量小。
          3. 不要删除已有测试。
          4. 不要执行危险命令。
          5. 修改后尽量运行已有测试或校验命令。
          6. 不要提交 git，不要 push。
          7. 完成后给出变更摘要。
          "@

          Write-Host "Running Codex..."
          codex exec --dangerously-bypass-approvals-and-sandbox $Prompt

          Write-Host "Git status after:"
          $GitStatus = git status --short | Out-String
          Write-Host $GitStatus

          Write-Host "Git diff:"
          $DiffStat = git diff --stat | Out-String
          Write-Host $DiffStat

          if ($env:HERMES_CALLBACK_URL -and "${{ inputs.receive_id }}") {
            Write-Host "Sending callback to Hermes..."

            $Body = @{
              receive_id = "${{ inputs.receive_id }}"
              task = "${{ inputs.task }}"
              status = "NEEDS_REVIEW"
              branch = $BranchName
              repo_path = $RepoPath
              git_status = $GitStatus
              diff_stat = $DiffStat
            } | ConvertTo-Json -Depth 5

            Invoke-RestMethod `
              -Uri $env:HERMES_CALLBACK_URL `
              -Method Post `
              -Headers @{ "x-hermes-secret" = $env:HERMES_CALLBACK_SECRET } `
              -Body $Body `
              -ContentType "application/json"

            Write-Host "Callback sent."
          } else {
            Write-Host "Callback skipped. Missing HERMES_CALLBACK_URL or receive_id."
          }
