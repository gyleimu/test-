name: Hermes Dev Runner

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Hermes dev task"
        required: true
        type: string

jobs:
  run-dev-task:
    runs-on: self-hosted

    steps:
      - name: Print task
        shell: powershell
        run: |
          Write-Host "Hermes received task:"
          Write-Host "${{ inputs.task }}"

      - name: Check Git
        shell: powershell
        run: |
          git --version
      - name: Check Codex
        shell: powershell
        run: |
         where.exe codex
         codex --version
