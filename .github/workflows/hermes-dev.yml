name: Hermes Dev Runner

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Hermes dev mode: run / approve / rollback / sync"
        required: false
        default: "run"
        type: string
      task:
        description: "Hermes dev task"
        required: false
        default: ""
        type: string
      receive_id:
        description: "Feishu receive id"
        required: false
        type: string

jobs:
  run-dev-task:
    runs-on: self-hosted

    env:
      HTTP_PROXY: http://127.0.0.1:7890
      HTTPS_PROXY: http://127.0.0.1:7890
      NO_PROXY: localhost,127.0.0.1

      HERMES_MODE: ${{ inputs.mode }}
      HERMES_TASK: ${{ inputs.task }}
      HERMES_RECEIVE_ID: ${{ inputs.receive_id }}

      HERMES_CALLBACK_URL: ${{ secrets.HERMES_CALLBACK_URL }}
      HERMES_CALLBACK_SECRET: ${{ secrets.HERMES_CALLBACK_SECRET }}

      HERMES_REPO_PATH: C:\Users\AL\Documents\CharacterOS

    steps:
      - name: Print task
        shell: pwsh
        run: |
          Write-Host "Hermes mode: $env:HERMES_MODE"
          Write-Host "Hermes task: $env:HERMES_TASK"
          Write-Host "Receive ID: $env:HERMES_RECEIVE_ID"
          Write-Host "Repo path: $env:HERMES_REPO_PATH"

      - name: Check tools
        shell: pwsh
        run: |
          git --version
          node --version
          if ($env:HERMES_MODE -eq "run") {
            codex --version
            Get-Command codex
          }

      - name: Initialize Hermes state
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $files = @(
            "hermes_status.txt",
            "hermes_branch.txt",
            "hermes_git_status.txt",
            "hermes_diff_stat.txt",
            "hermes_changed_files.txt",
            "hermes_risk.txt",
            "hermes_message.txt",
            "hermes_commit.txt"
          )

          foreach ($f in $files) {
            Set-Content -Path (Join-Path $env:RUNNER_TEMP $f) -Value "" -Encoding UTF8
          }

          Set-Content -Path (Join-Path $env:RUNNER_TEMP "hermes_status.txt") -Value "STARTED" -Encoding UTF8
          Set-Content -Path (Join-Path $env:RUNNER_TEMP "hermes_risk.txt") -Value "UNKNOWN" -Encoding UTF8

          if (Test-Path $env:HERMES_REPO_PATH) {
            Set-Location $env:HERMES_REPO_PATH
            $CurrentBranch = git branch --show-current
            Set-Content -Path (Join-Path $env:RUNNER_TEMP "hermes_branch.txt") -Value $CurrentBranch -Encoding UTF8
          }

      - name: Sync local git state
        if: ${{ env.HERMES_MODE == 'sync' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $StatusFile = Join-Path $env:RUNNER_TEMP "hermes_status.txt"
          $BranchFile = Join-Path $env:RUNNER_TEMP "hermes_branch.txt"
          $GitStatusFile = Join-Path $env:RUNNER_TEMP "hermes_git_status.txt"
          $DiffStatFile = Join-Path $env:RUNNER_TEMP "hermes_diff_stat.txt"
          $ChangedFilesFile = Join-Path $env:RUNNER_TEMP "hermes_changed_files.txt"
          $RiskFile = Join-Path $env:RUNNER_TEMP "hermes_risk.txt"
          $MessageFile = Join-Path $env:RUNNER_TEMP "hermes_message.txt"
          $CommitFile = Join-Path $env:RUNNER_TEMP "hermes_commit.txt"

          if (!(Test-Path $env:HERMES_REPO_PATH)) {
            Set-Content -Path $StatusFile -Value "SYNC_FAILED" -Encoding UTF8
            Set-Content -Path $RiskFile -Value "HIGH" -Encoding UTF8
            Set-Content -Path $MessageFile -Value "Repo path not found: $env:HERMES_REPO_PATH" -Encoding UTF8
            throw "Repo path not found"
          }

          Set-Location $env:HERMES_REPO_PATH

          $CurrentBranch = git branch --show-current
          $CommitHash = git rev-parse HEAD
          $GitStatus = git status --short | Out-String
          $DiffStat = git diff --stat | Out-String
          $ChangedFiles = git status --porcelain | ForEach-Object {
            if ($_.Length -gt 3) { $_.Substring(3) }
          }

          Set-Content -Path $BranchFile -Value $CurrentBranch -Encoding UTF8
          Set-Content -Path $CommitFile -Value $CommitHash -Encoding UTF8
          Set-Content -Path $GitStatusFile -Value $GitStatus -Encoding UTF8
          Set-Content -Path $DiffStatFile -Value $DiffStat -Encoding UTF8
          Set-Content -Path $ChangedFilesFile -Value ($ChangedFiles | Out-String) -Encoding UTF8

          if ($GitStatus.Trim()) {
            Set-Content -Path $StatusFile -Value "DIRTY" -Encoding UTF8
            Set-Content -Path $RiskFile -Value "MEDIUM" -Encoding UTF8
            Set-Content -Path $MessageFile -Value "本地仓库存在未提交改动，MySQL 状态应更新为 DIRTY。" -Encoding UTF8
          } else {
            Set-Content -Path $StatusFile -Value "CLEAN" -Encoding UTF8
            Set-Content -Path $RiskFile -Value "LOW" -Encoding UTF8
            Set-Content -Path $MessageFile -Value "本地仓库是干净的，MySQL 状态可以清理旧的 NEEDS_REVIEW。" -Encoding UTF8
          }

      - name: Run Codex in local repo
        if: ${{ env.HERMES_MODE == 'run' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          [Console]::InputEncoding = [System.Text.Encoding]::UTF8
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8

          $RepoPath = $env:HERMES_REPO_PATH

          $StatusFile = Join-Path $env:RUNNER_TEMP "hermes_status.txt"
          $BranchFile = Join-Path $env:RUNNER_TEMP "hermes_branch.txt"
          $GitStatusFile = Join-Path $env:RUNNER_TEMP "hermes_git_status.txt"
          $DiffStatFile = Join-Path $env:RUNNER_TEMP "hermes_diff_stat.txt"
          $ChangedFilesFile = Join-Path $env:RUNNER_TEMP "hermes_changed_files.txt"
          $RiskFile = Join-Path $env:RUNNER_TEMP "hermes_risk.txt"
          $MessageFile = Join-Path $env:RUNNER_TEMP "hermes_message.txt"
          $CommitFile = Join-Path $env:RUNNER_TEMP "hermes_commit.txt"

          Set-Content -Path $StatusFile -Value "FAILED" -Encoding UTF8

          try {
            if (!(Test-Path $RepoPath)) {
              Set-Content -Path $MessageFile -Value "Repo path not found: $RepoPath" -Encoding UTF8
              throw "Repo path not found: $RepoPath"
            }

            Set-Location $RepoPath

            $BeforeStatus = git status --porcelain
            if ($BeforeStatus) {
              Set-Content -Path $StatusFile -Value "REPO_NOT_CLEAN" -Encoding UTF8
              Set-Content -Path $GitStatusFile -Value ($BeforeStatus | Out-String) -Encoding UTF8
              Set-Content -Path $RiskFile -Value "HIGH" -Encoding UTF8
              Set-Content -Path $MessageFile -Value "本地仓库不干净。请先 /project sync 查看状态，或 approve / rollback / 手动处理。" -Encoding UTF8
              throw "Repo is not clean."
            }

            $BaseBranch = "main"
            git rev-parse --verify main *> $null
            if ($LASTEXITCODE -ne 0) {
              git rev-parse --verify master *> $null
              if ($LASTEXITCODE -eq 0) {
                $BaseBranch = "master"
              }
            }

            git checkout $BaseBranch

            $Timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
            $RunId = $env:GITHUB_RUN_ID
            $BranchName = "hermes/dev-$Timestamp-$RunId"

            git checkout -b $BranchName
            Set-Content -Path $BranchFile -Value $BranchName -Encoding UTF8

            $PromptLines = New-Object System.Collections.Generic.List[string]
            $PromptLines.Add("你是 Codex，本次由 Hermes 自动触发。")
            $PromptLines.Add("")
            $PromptLines.Add("任务：")
            $PromptLines.Add($env:HERMES_TASK)
            $PromptLines.Add("")
            $PromptLines.Add("硬性约束：")
            $PromptLines.Add("1. 只允许完成用户明确要求的修改。")
            $PromptLines.Add("2. 不要做顺手优化。")
            $PromptLines.Add("3. 不要升级架构。")
            $PromptLines.Add("4. 不要新增无关文件。")
            $PromptLines.Add("5. 不要提交 git，不要 push。")
            $PromptLines.Add("6. 完成后必须停止，不要继续扩展任务。")
            $PromptLines.Add("")
            $PromptLines.Add("完成后输出：")
            $PromptLines.Add("- 实际修改了哪些文件")
            $PromptLines.Add("- 如何验证")
            $PromptLines.Add("- 是否存在风险")

            $Prompt = $PromptLines -join [Environment]::NewLine

            codex exec --dangerously-bypass-approvals-and-sandbox $Prompt

            $GitStatus = git status --short | Out-String
            $DiffStat = git diff --stat | Out-String
            $ChangedFiles = git diff --name-only
            $CommitHash = git rev-parse HEAD

            Set-Content -Path $GitStatusFile -Value $GitStatus -Encoding UTF8
            Set-Content -Path $DiffStatFile -Value $DiffStat -Encoding UTF8
            Set-Content -Path $ChangedFilesFile -Value ($ChangedFiles | Out-String) -Encoding UTF8
            Set-Content -Path $CommitFile -Value $CommitHash -Encoding UTF8

            $ChangedCount = 0
            if ($ChangedFiles) { $ChangedCount = @($ChangedFiles).Count }

            $Risk = "LOW"
            if ($ChangedCount -gt 5) { $Risk = "HIGH" }
            elseif ($ChangedCount -gt 2) { $Risk = "MEDIUM" }

            Set-Content -Path $RiskFile -Value $Risk -Encoding UTF8

            if ($ChangedCount -eq 0) {
              Set-Content -Path $StatusFile -Value "NO_CHANGES" -Encoding UTF8
              Set-Content -Path $MessageFile -Value "Codex 执行完成，但没有产生文件改动。" -Encoding UTF8
            } else {
              Set-Content -Path $StatusFile -Value "NEEDS_REVIEW" -Encoding UTF8
              Set-Content -Path $MessageFile -Value "Codex 已完成修改，等待用户审核。" -Encoding UTF8
            }
          }
          catch {
            if (!(Test-Path $MessageFile)) {
              Set-Content -Path $MessageFile -Value $_.Exception.Message -Encoding UTF8
            }
            throw
          }

      - name: Approve Hermes dev branch
        if: ${{ env.HERMES_MODE == 'approve' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $StatusFile = Join-Path $env:RUNNER_TEMP "hermes_status.txt"
          $BranchFile = Join-Path $env:RUNNER_TEMP "hermes_branch.txt"
          $GitStatusFile = Join-Path $env:RUNNER_TEMP "hermes_git_status.txt"
          $DiffStatFile = Join-Path $env:RUNNER_TEMP "hermes_diff_stat.txt"
          $ChangedFilesFile = Join-Path $env:RUNNER_TEMP "hermes_changed_files.txt"
          $RiskFile = Join-Path $env:RUNNER_TEMP "hermes_risk.txt"
          $MessageFile = Join-Path $env:RUNNER_TEMP "hermes_message.txt"
          $CommitFile = Join-Path $env:RUNNER_TEMP "hermes_commit.txt"

          Set-Content -Path $StatusFile -Value "APPROVE_FAILED" -Encoding UTF8

          Set-Location $env:HERMES_REPO_PATH

          $CurrentBranch = git branch --show-current
          Set-Content -Path $BranchFile -Value $CurrentBranch -Encoding UTF8

          if (!$CurrentBranch.StartsWith("hermes/dev-")) {
            Set-Content -Path $StatusFile -Value "APPROVE_BLOCKED" -Encoding UTF8
            Set-Content -Path $RiskFile -Value "HIGH" -Encoding UTF8
            Set-Content -Path $MessageFile -Value "当前分支不是 hermes/dev-*，拒绝提交，防止误提交主分支。" -Encoding UTF8
            throw "Approve blocked."
          }

          $GitStatus = git status --short | Out-String
          $DiffStat = git diff --stat | Out-String
          $ChangedFiles = git diff --name-only

          Set-Content -Path $GitStatusFile -Value $GitStatus -Encoding UTF8
          Set-Content -Path $DiffStatFile -Value $DiffStat -Encoding UTF8
          Set-Content -Path $ChangedFilesFile -Value ($ChangedFiles | Out-String) -Encoding UTF8

          if (!$ChangedFiles) {
            Set-Content -Path $StatusFile -Value "NO_CHANGES_TO_APPROVE" -Encoding UTF8
            Set-Content -Path $RiskFile -Value "LOW" -Encoding UTF8
            Set-Content -Path $MessageFile -Value "当前 Hermes dev 分支没有可提交改动。" -Encoding UTF8
            exit 0
          }

          git config user.name "Hermes Bot"
          git config user.email "hermes-bot@example.com"

          git add -A
          git commit -m "Hermes dev approve: $env:HERMES_TASK"

          $CommitHash = git rev-parse HEAD
          Set-Content -Path $CommitFile -Value $CommitHash -Encoding UTF8

          git push -u origin $CurrentBranch

          Set-Content -Path $StatusFile -Value "APPROVED_PUSHED" -Encoding UTF8
          Set-Content -Path $RiskFile -Value "LOW" -Encoding UTF8
          Set-Content -Path $MessageFile -Value "已提交并推送当前 Hermes dev 分支。" -Encoding UTF8

      - name: Rollback Hermes dev branch
        if: ${{ env.HERMES_MODE == 'rollback' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $StatusFile = Join-Path $env:RUNNER_TEMP "hermes_status.txt"
          $BranchFile = Join-Path $env:RUNNER_TEMP "hermes_branch.txt"
          $GitStatusFile = Join-Path $env:RUNNER_TEMP "hermes_git_status.txt"
          $DiffStatFile = Join-Path $env:RUNNER_TEMP "hermes_diff_stat.txt"
          $ChangedFilesFile = Join-Path $env:RUNNER_TEMP "hermes_changed_files.txt"
          $RiskFile = Join-Path $env:RUNNER_TEMP "hermes_risk.txt"
          $MessageFile = Join-Path $env:RUNNER_TEMP "hermes_message.txt"

          Set-Content -Path $StatusFile -Value "ROLLBACK_FAILED" -Encoding UTF8

          Set-Location $env:HERMES_REPO_PATH

          $CurrentBranch = git branch --show-current
          Set-Content -Path $BranchFile -Value $CurrentBranch -Encoding UTF8

          if (!$CurrentBranch.StartsWith("hermes/dev-")) {
            Set-Content -Path $StatusFile -Value "ROLLBACK_BLOCKED" -Encoding UTF8
            Set-Content -Path $RiskFile -Value "HIGH" -Encoding UTF8
            Set-Content -Path $MessageFile -Value "当前分支不是 hermes/dev-*，拒绝回滚，防止误清理主分支。" -Encoding UTF8
            throw "Rollback blocked."
          }

          $GitStatusBefore = git status --short | Out-String
          $DiffStatBefore = git diff --stat | Out-String
          $ChangedFilesBefore = git diff --name-only

          Set-Content -Path $GitStatusFile -Value $GitStatusBefore -Encoding UTF8
          Set-Content -Path $DiffStatFile -Value $DiffStatBefore -Encoding UTF8
          Set-Content -Path $ChangedFilesFile -Value ($ChangedFilesBefore | Out-String) -Encoding UTF8

          git reset --hard
          git clean -fd

          Set-Content -Path $StatusFile -Value "ROLLED_BACK" -Encoding UTF8
          Set-Content -Path $RiskFile -Value "LOW" -Encoding UTF8
          Set-Content -Path $MessageFile -Value "已回滚当前 Hermes dev 分支的本地改动。" -Encoding UTF8

      - name: Invalid Hermes mode
        if: ${{ env.HERMES_MODE != 'run' && env.HERMES_MODE != 'approve' && env.HERMES_MODE != 'rollback' && env.HERMES_MODE != 'sync' }}
        shell: pwsh
        run: |
          Set-Content -Path (Join-Path $env:RUNNER_TEMP "hermes_status.txt") -Value "INVALID_MODE" -Encoding UTF8
          Set-Content -Path (Join-Path $env:RUNNER_TEMP "hermes_risk.txt") -Value "HIGH" -Encoding UTF8
          Set-Content -Path (Join-Path $env:RUNNER_TEMP "hermes_message.txt") -Value "无效 mode。只支持 run / approve / rollback / sync。" -Encoding UTF8
          throw "Invalid Hermes mode: $env:HERMES_MODE"

      - name: Send callback to Hermes
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if (!$env:HERMES_CALLBACK_URL) {
            Write-Host "Callback skipped. Missing HERMES_CALLBACK_URL."
            exit 0
          }

          if (!$env:HERMES_RECEIVE_ID) {
            Write-Host "Callback skipped. Missing receive_id."
            exit 0
          }

          $env:HERMES_STATUS_FILE = Join-Path $env:RUNNER_TEMP "hermes_status.txt"
          $env:HERMES_BRANCH_FILE = Join-Path $env:RUNNER_TEMP "hermes_branch.txt"
          $env:HERMES_GIT_STATUS_FILE = Join-Path $env:RUNNER_TEMP "hermes_git_status.txt"
          $env:HERMES_DIFF_STAT_FILE = Join-Path $env:RUNNER_TEMP "hermes_diff_stat.txt"
          $env:HERMES_CHANGED_FILES_FILE = Join-Path $env:RUNNER_TEMP "hermes_changed_files.txt"
          $env:HERMES_RISK_FILE = Join-Path $env:RUNNER_TEMP "hermes_risk.txt"
          $env:HERMES_MESSAGE_FILE = Join-Path $env:RUNNER_TEMP "hermes_message.txt"
          $env:HERMES_COMMIT_FILE = Join-Path $env:RUNNER_TEMP "hermes_commit.txt"

          $CallbackScript = @'
          const fs = require("fs");

          function readText(path) {
            try {
              return fs.readFileSync(path, "utf8");
            } catch {
              return "";
            }
          }

          function lines(text) {
            return String(text || "")
              .split(/\r?\n/)
              .map(s => s.trim())
              .filter(Boolean);
          }

          async function main() {
            const status = readText(process.env.HERMES_STATUS_FILE || "").trim() || "UNKNOWN";
            const branch = readText(process.env.HERMES_BRANCH_FILE || "").trim();
            const commit = readText(process.env.HERMES_COMMIT_FILE || "").trim();
            const gitStatus = readText(process.env.HERMES_GIT_STATUS_FILE || "");
            const diffStat = readText(process.env.HERMES_DIFF_STAT_FILE || "");
            const changedFilesText = readText(process.env.HERMES_CHANGED_FILES_FILE || "");
            const risk = readText(process.env.HERMES_RISK_FILE || "").trim() || "UNKNOWN";
            const message = readText(process.env.HERMES_MESSAGE_FILE || "").trim();

            const changedFiles = lines(changedFilesText);

            const body = {
              receive_id: process.env.HERMES_RECEIVE_ID || "",
              mode: process.env.HERMES_MODE || "",
              task: process.env.HERMES_TASK || "",
              status,
              risk,
              message,
              branch,
              commit,
              repo_path: process.env.HERMES_REPO_PATH || "",
              changed_count: changedFiles.length,
              changed_preview: changedFiles.slice(0, 8).join("\n"),
              changed_files: changedFiles,
              git_status: gitStatus,
              diff_stat: diffStat,
              synced_at: new Date().toISOString()
            };

            const response = await fetch(process.env.HERMES_CALLBACK_URL, {
              method: "POST",
              headers: {
                "content-type": "application/json",
                "x-hermes-secret": process.env.HERMES_CALLBACK_SECRET || ""
              },
              body: JSON.stringify(body)
            });

            const text = await response.text();
            console.log(`Hermes callback HTTP ${response.status}`);
            if (text) console.log(text);
            if (!response.ok) process.exitCode = 1;
          }

          main().catch((error) => {
            console.error(error);
            process.exitCode = 1;
          });
          '@

          $CallbackScriptPath = Join-Path $env:RUNNER_TEMP "hermes_callback.js"
          Set-Content -Path $CallbackScriptPath -Value $CallbackScript -Encoding UTF8

          node $CallbackScriptPath
